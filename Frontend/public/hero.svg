<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#2b6b4a" stop-opacity="1" />
      <stop offset="60%" stop-color="#5fb57f" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#dff7e6" stop-opacity="0.85" />
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency="0.6" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend mode="overlay" in2="SourceGraphic" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <g opacity="0.18" filter="url(#grain)">
    <rect width="100%" height="100%" fill="#ffffff"/>
  </g>
  <g transform="translate(1200,120) scale(0.9)" opacity="0.55">
    <rect x="0" y="0" width="620" height="520" rx="28" fill="#ffffff" opacity="0.06" />
    <rect x="24" y="24" width="572" height="120" rx="20" fill="#ffffff" opacity="0.08" />
  </g>
  <g transform="translate(120,200)">
    <circle cx="140" cy="140" r="120" fill="#fff" opacity="0.03" />
    <circle cx="380" cy="80" r="80" fill="#fff" opacity="0.02" />
    <rect x="560" y="40" width="420" height="260" rx="24" fill="#fff" opacity="0.02" />
  </g>
</svg>
